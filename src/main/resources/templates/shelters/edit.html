<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar abrigo</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<h1 id="page-title">Editar abrigo</h1>

<div th:replace="~{fragments/messages :: messages}"></div>

<nav>
    <a id="link-back-to-shelters" th:href="@{/shelters}">Voltar para a lista</a>
</nav>

<form id="shelter-form"
      th:action="@{/shelters/{id}(id=${shelterId})}"
      th:object="${shelterForm}"
      method="post"
      novalidate>
    <div>
        <label for="name">Nome</label>
        <input id="name" type="text" th:field="*{name}">
        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
    </div>

    <div>
        <label for="phoneNumber">Telefone</label>
        <input id="phoneNumber" type="text" th:field="*{phoneNumber}">
        <div th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
    </div>

    <div>
        <label for="email">Email</label>
        <input id="email" type="text" th:field="*{email}">
        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
    </div>

    <div>
        <button id="submit-shelter" type="submit">Salvar alterações</button>
    </div>
</form>
</body>
</html>
