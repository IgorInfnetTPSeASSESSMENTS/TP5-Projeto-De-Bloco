name: Security

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Cache do Dependency-Check
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository/org/owasp/dependency-check-data
            ~/.dependency-check
          key: dependency-check-${{ runner.os }}-${{ hashFiles('pom.xml') }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: Limpar base corrompida anterior
        run: |
          mvn org.owasp:dependency-check-maven:purge || true
          rm -rf ~/.m2/repository/org/owasp/dependency-check-data || true
          rm -rf ~/.dependency-check || true

      - name: Rodar OWASP Dependency-Check
        id: dc
        continue-on-error: true
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DnvdApiKeyEnvironmentVariable=NVD_API_KEY \
            -DnvdMaxRetryCount=20 \
            -DnvdApiDelay=5000 \
            -Dformats=HTML,JSON \
            -DfailBuildOnCVSS=7 \
            -DossindexAnalyzerEnabled=false

      - name: Retry após purge
        if: steps.dc.outcome == 'failure'
        run: |
          mvn org.owasp:dependency-check-maven:purge || true
          rm -rf ~/.m2/repository/org/owasp/dependency-check-data || true
          rm -rf ~/.dependency-check || true

          mvn org.owasp:dependency-check-maven:check \
            -DnvdApiKeyEnvironmentVariable=NVD_API_KEY \
            -DnvdMaxRetryCount=20 \
            -DnvdApiDelay=5000 \
            -Dformats=HTML,JSON \
            -DfailBuildOnCVSS=7 \
            -DossindexAnalyzerEnabled=false

      - name: Upload relatório Dependency-Check
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.json

      - name: Resumo Security
        if: always()
        run: |
          {
            echo "## Security Summary"
            echo ""
            echo "- OWASP Dependency-Check executado"
            echo "- NVD API Key fornecida via environment variable"
            echo "- Relatórios gerados em HTML e JSON"
            echo "- Artifact: \`dependency-check-report\`"
          } >> "$GITHUB_STEP_SUMMARY"