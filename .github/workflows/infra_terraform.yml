name: Infra Terraform

on:
  workflow_call:
    inputs:
      apply:
        required: true
        type: boolean
      environment_name:
        required: true
        type: string
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: sa-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -recursive

      - name: Terraform fmt check
        run: terraform fmt -check

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan \
            -var="vpc_id=${{ secrets.AWS_VPC_ID }}" \
            -var="public_subnet_ids=${{ secrets.AWS_PUBLIC_SUBNET_IDS }}" \
            -var="docker_image=${{ secrets.DOCKER_IMAGE }}:latest"

      - name: Terraform apply
        if: ${{ inputs.apply || github.event_name == 'workflow_dispatch' }}
        run: |
          terraform apply -auto-approve \
            -var="vpc_id=${{ secrets.AWS_VPC_ID }}" \
            -var="public_subnet_ids=${{ secrets.AWS_PUBLIC_SUBNET_IDS }}" \
            -var="docker_image=${{ secrets.DOCKER_IMAGE }}:latest"

      - name: Resumo Terraform
        if: always()
        run: |
          {
            echo "## Terraform Summary"
            echo ""
            echo "- Environment: \`${{ inputs.environment_name }}\`"
            echo "- Init/validate/plan executados"
            echo "- Apply executado: \`${{ inputs.apply || github.event_name == 'workflow_dispatch' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"