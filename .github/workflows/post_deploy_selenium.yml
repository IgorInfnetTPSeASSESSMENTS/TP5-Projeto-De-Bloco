name: Post Deploy Selenium

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  smoke-e2e:
    name: Post-deploy smoke test
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Configurar AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: sa-east-1

      - name: Descobrir DNS do ALB
        env:
          ALB_NAME: ${{ secrets.ALB_NAME }}
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names "$ALB_NAME" \
            --query 'LoadBalancers[0].DNSName' \
            --output text)

          if [ -z "$ALB_DNS" ] || [ "$ALB_DNS" = "None" ]; then
            echo "Erro ao descobrir DNS do ALB"
            exit 1
          fi

          echo "APP_BASE_URL=http://${ALB_DNS}" >> "$GITHUB_ENV"
          echo "Base URL descoberta: http://${ALB_DNS}"

      - name: Rodar smoke test pós-deploy
        run: |
          mvn \
            -Dtest=PostDeploySmokeTest \
            -Dapp.baseUrl="${APP_BASE_URL}" \
            -Dheadless=true \
            test

      - name: Upload relatório pós-deploy
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-selenium-reports
          path: target/surefire-reports

      - name: Resumo do smoke test
        if: always()
        run: |
          {
            echo "## Post Deploy Selenium Summary"
            echo ""
            echo "- Environment: \`${{ inputs.environment_name }}\`"
            echo "- URL testada: \`${APP_BASE_URL}\`"
            echo "- Smoke test Selenium executado"
          } >> "$GITHUB_STEP_SUMMARY"