name: Post Deploy Selenium

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      alb_dns_name:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  smoke-e2e:
    name: Post-deploy smoke test
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Configurar AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: sa-east-1

      - name: Definir URL da aplicação
        run: |
          ALB_DNS="${{ inputs.alb_dns_name }}"

          if [ -z "$ALB_DNS" ] || [ "$ALB_DNS" = "None" ]; then
            echo "Erro: ALB DNS não foi recebido pelo workflow."
            exit 1
          fi

          echo "APP_BASE_URL=http://${ALB_DNS}" >> "$GITHUB_ENV"
          echo "Base URL definida: http://${ALB_DNS}"

      - name: Rodar smoke test pós-deploy
        run: |
          mvn verify \
            -Dapp.baseUrl="${APP_BASE_URL}" \
            -Dheadless=true \
            -Dit.test=PostDeploySmokeIT

      - name: Upload relatório pós-deploy
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-selenium-reports
          path: target/surefire-reports

      - name: Resumo do smoke test
        if: always()
        run: |
          {
            echo "## Post Deploy Selenium Summary"
            echo ""
            echo "- Environment: \`${{ inputs.environment_name }}\`"
            echo "- URL testada: \`${APP_BASE_URL}\`"
            echo "- Smoke test Selenium executado"
          } >> "$GITHUB_STEP_SUMMARY"